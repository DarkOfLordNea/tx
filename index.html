<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài Xỉu 3D Luxury</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1 class="title">TÀI XỈU <span>3D CASINO</span></h1>

        <div class="dice-wrapper">
            <div class="dice-3d" id="cube1">
                <div class="face front">1</div>
                <div class="face back">6</div>
                <div class="face right">3</div>
                <div class="face left">4</div>
                <div class="face top">2</div>
                <div class="face bottom">5</div>
            </div>
            <div class="dice-3d" id="cube2">
                <div class="face front">1</div>
                <div class="face back">6</div>
                <div class="face right">3</div>
                <div class="face left">4</div>
                <div class="face top">2</div>
                <div class="face bottom">5</div>
            </div>
            <div class="dice-3d" id="cube3">
                <div class="face front">1</div>
                <div class="face back">6</div>
                <div class="face right">3</div>
                <div class="face left">4</div>
                <div class="face top">2</div>
                <div class="face bottom">5</div>
            </div>
        </div>

        <div class="result-display">
            Tổng điểm: <span id="result-score">?</span> - <span id="result-text">Đang chờ...</span>
        </div>

        <div class="betting-section">
            <button class="bet-btn tai" onclick="rollDice()">
                <span class="label">TÀI</span>
                <span class="range">11 - 17</span>
            </button>
            
            <div class="timer">
                <div class="timer-ring"></div>
                <span id="countdown">30</span>
            </div>

            <button class="bet-btn xiu" onclick="rollDice()">
                <span class="label">XỈU</span>
                <span class="range">3 - 10</span>
            </button>
        </div>

        <div class="history">
            <h3>Lịch sử phiên</h3>
            <div class="history-list" id="history-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
