<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino 3D - Tài Xỉu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="auth-header">
            <span id="user-display">Khách</span> | <b id="balance-display">0đ</b>
            <button onclick="toggleAuthModal()">Tài khoản</button>
        </div>

        <h1 class="title">TÀI XỈU <span>3D</span></h1>

        <div class="dice-wrapper">
            <div class="dice-3d" id="cube1"><div class="face front">1</div><div class="face back">6</div><div class="face right">3</div><div class="face left">4</div><div class="face top">2</div><div class="face bottom">5</div></div>
            <div class="dice-3d" id="cube2"><div class="face front">1</div><div class="face back">6</div><div class="face right">3</div><div class="face left">4</div><div class="face top">2</div><div class="face bottom">5</div></div>
            <div class="dice-3d" id="cube3"><div class="face front">1</div><div class="face back">6</div><div class="face right">3</div><div class="face left">4</div><div class="face top">2</div><div class="face bottom">5</div></div>
        </div>

        <div id="status">Sẵn sàng đặt cược</div>

        <div class="betting-section">
            <button class="bet-btn tai" onclick="placeBet('TAI')"><span class="label">TÀI</span><span class="range">11-17</span></button>
            <button class="bet-btn xiu" onclick="placeBet('XIU')"><span class="label">XỈU</span><span class="range">3-10</span></button>
        </div>

        <div class="history">
            <h3>Lịch sử phiên (Soi cầu)</h3>
            <div class="history-list" id="history-list"></div>
        </div>
    </div>

    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <div class="auth-tabs">
                <button onclick="showAuth('login')">Đăng nhập</button>
                <button onclick="showAuth('register')">Đăng ký (+50k)</button>
            </div>
            <form id="auth-form">
                <input type="text" id="username" placeholder="Tên đăng nhập" required>
                <input type="password" id="password" placeholder="Mật khẩu" required>
                <button type="submit" class="submit-btn">XÁC NHẬN</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
